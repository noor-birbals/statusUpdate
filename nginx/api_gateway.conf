server {
    server_name api-insta.birbals.com;
    # allow 1.1.1.1;
    # deny all;
    # Log files
    access_log /var/log/nginx/api_gateway_access.log;
    error_log /var/log/nginx/api_gateway_error.log;

    location /api/v1/mortgage-calculator {
        # Forward requests to the API server
        proxy_pass http://backend_server;

	# HTTP Basic Authentication setup
        #auth_basic "Protected API";
        #auth_basic_user_file /etc/nginx/.htpasswd;

        # Preserve the original host and IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        # Optionally limit client body size
        client_max_body_size 10M;

        # Rate limiting (optional)
        limit_req zone=api_limit burst=10 nodelay;

        # CORS settings (optional)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }
    location /api/v1/auth/login {

        # Forward requests to the API server
        proxy_pass http://backend_server;
        # Preserve the original host and IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Optional timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        # Optionally limit client body size
        client_max_body_size 10M;
        # CORS settings (optional)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }

    location /healthcheck {
        # Respond with 200 OK for health check requests
        #proxy_pass http://backend_server;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
    # Rate limiting zone configuration (optional)
    #limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api-insta.birbals.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api-insta.birbals.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


# Define API backend server (Move this outside the server block)
upstream backend_server {
    server 127.0.0.1:5000;  # API backend (adjust accordingly)
}

upstream backend_micurato_server {
    server 127.0.0.1:3005;  # API backend (adjust accordingly)
}

upstream backend_micuratoweb_server {
    server 127.0.0.1:8090;  
}

upstream backend_micuratoadmin_server {
    server 127.0.0.1:8092;  
}

upstream loadtest_backend_server {
    server 127.0.0.1:3200;
}

upstream loadtest_api_backend_server {
    server 127.0.0.1:3201;
}

upstream backend_instarefi_server {
    server 127.0.0.1:5000;  
}

upstream backend_silkitbirbals_server {
    server 127.0.0.1:3300;  
}

upstream backend_sprintbirbals_server {
    server 127.0.0.1:7000;  
}

upstream backend_meetthedrapers_server {
    server 127.0.0.1:6054;  # Your app running on port 6054
}


server {
    server_name loadtest-api.birbals.com;
    # allow 1.1.1.1;
    # deny all;
    # Log files
    access_log /var/log/nginx/loadtest_access.log;
    error_log /var/log/nginx/loadtest_error.log;

    location / {
        # Forward requests to the API server
        proxy_pass http://loadtest_api_backend_server;

	# HTTP Basic Authentication setup
        auth_basic "Protected API";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Preserve the original host and IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        # Optionally limit client body size
        client_max_body_size 10M;

        # Rate limiting (optional)
        #limit_req zone=api_limit burst=10 nodelay;

        # CORS settings (optional)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/loadtest-api.birbals.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/loadtest-api.birbals.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    server_name sprint.birbals.com;
    # allow 1.1.1.1;
    # deny all;
    # Log files
    access_log /var/log/nginx/sprintbirbals_access.log;
    error_log /var/log/nginx/sprintbirbals_error.log;

    # OAuth callback sends a very large ?code= query string
    large_client_header_buffers 4 32k;

    location / {
        # Forward requests to SprintStatus (Next.js on port 7000)
        proxy_pass http://backend_sprintbirbals_server;
        proxy_http_version 1.1;

        # Preserve the original host and IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent 502 "upstream sent too big header" on OAuth callback
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 32k;

        # Optional timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        # Optionally limit client body size
        client_max_body_size 10M;

        # CORS settings (optional)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }


    listen 443 ssl; # managed by Certbot
    #ssl_certificate /etc/letsencrypt/live/sprint.birbals.com/fullchain.pem; # managed by Certbot
    #ssl_certificate_key /etc/letsencrypt/live/sprint.birbals.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    ssl_certificate /etc/letsencrypt/live/sprint.birbals.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sprint.birbals.com/privkey.pem; # managed by Certbot
}

